services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: college
      MYSQL_USER: username
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/database.sql:/docker-entrypoint-initdb.d/database.sql:ro

  backend:
    build: ./backend
    ports:
      - "8001:80"
    environment:
      DB_HOST: mysql
      DB_NAME: college
      DB_USER: username
      DB_PASS: password
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    ports:
      - "8081:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  mysql_data:
